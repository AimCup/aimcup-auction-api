# Test ("next") stack for api-next-auction.aimcup.xyz.
# MongoDB and Redis are internal-only; the API is published on host port 8091 -> container 8080.
services:

  aimcup-auction-mongo-next:
    container_name: aimcup-auction-mongo-next
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - aimcup-auction-mongo-data-next:/data/db
    networks:
      - default

  aimcup-auction-redis-next:
    container_name: aimcup-auction-redis-next
    image: redis:7
    restart: always
    networks:
      - default

  aimcup-auction-api-next:
    container_name: aimcup-auction-api-next
    depends_on:
      aimcup-auction-mongo-next:
        condition: service_healthy
    build:
      context: .
      dockerfile: ./build.next.Dockerfile
    restart: always
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_USERNAME:-root}:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@aimcup-auction-mongo-next:27017/auction?authSource=admin
      - SPRING_DATA_REDIS_HOST=aimcup-auction-redis-next
      - SPRING_DATA_REDIS_PORT=6379
      # --- secrets / env-specific, injected by the deploy workflow or Portainer (never committed) ---
      - OSU_CLIENT_ID=${OSU_CLIENT_ID:-58580}
      - OSU_CLIENT_SECRET=${OSU_CLIENT_SECRET}
      - OSU_API_CLIENT_ID=${OSU_API_CLIENT_ID}
      - OSU_API_CLIENT_SECRET=${OSU_API_CLIENT_SECRET}
      - AUCTION_JWT_SECRET=${AUCTION_JWT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - AUCTION_DISCORD_MESSAGE_CONTENT=${AUCTION_DISCORD_MESSAGE_CONTENT:-true}
      - AUCTION_DEV_GRANT_ADMIN=${AUCTION_DEV_GRANT_ADMIN:-true}
      - AUCTION_ADMIN_OSU_IDS=${AUCTION_ADMIN_OSU_IDS}
    ports:
      - "8091:8080"
    networks:
      - default

volumes:
  aimcup-auction-mongo-data-next:

networks:
  default:
    external: true
    name: aimcup-network
