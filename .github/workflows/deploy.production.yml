name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Maven verify
        run: ./mvnw --batch-mode --no-transfer-progress verify -DskipTests

      - name: Prepare production stack
        run: |
          docker compose -p aimcup-auction-api-prod -f docker-compose.yml down --remove-orphans || true
          # Fixed container_names from earlier deploys can block compose up.
          docker rm -f aimcup-auction-api aimcup-auction-mongo aimcup-auction-redis 2>/dev/null || true

      - name: Build and deploy Docker services
        run: docker compose -p aimcup-auction-api-prod -f docker-compose.yml up -d --build
        env:
          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}
          OSU_API_CLIENT_ID: ${{ secrets.OSU_API_CLIENT_ID }}
          OSU_API_CLIENT_SECRET: ${{ secrets.OSU_API_CLIENT_SECRET }}
          AUCTION_JWT_SECRET: ${{ secrets.AUCTION_JWT_SECRET }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          AUCTION_DISCORD_MESSAGE_CONTENT: ${{ vars.AUCTION_DISCORD_MESSAGE_CONTENT }}
          AUCTION_ADMIN_OSU_IDS: ${{ secrets.AUCTION_ADMIN_OSU_IDS }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
