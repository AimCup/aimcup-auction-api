# Test ("next") profile (next.api.auction.aimcup.xyz). Only non-secret, environment-specific config
# lives here; secrets are supplied at runtime via environment variables — see auction-todo-by-me.md.
spring:
  graphql:
    graphiql:
      # Playground left on for the test environment to ease debugging.
      enabled: true

server:
  # Behind Nginx Proxy Manager (TLS terminated there); honour X-Forwarded-* headers.
  forward-headers-strategy: framework

auction:
  frontend-url: https://next.auction.aimcup.xyz
  cors-allowed-origins: https://next.auction.aimcup.xyz
  security:
    # Test convenience: every signed-in osu! user may create auctions. Set AUCTION_DEV_GRANT_ADMIN=false
    # (and AUCTION_ADMIN_OSU_IDS) to lock it down.
    dev-grant-admin: ${AUCTION_DEV_GRANT_ADMIN:true}
  osu:
    # OAuth2 client id is public; the matching client secret comes from OSU_CLIENT_SECRET.
    client-id: ${OSU_CLIENT_ID:58580}
    redirect-uri: https://next.api.auction.aimcup.xyz/oauth2/callback/osu
