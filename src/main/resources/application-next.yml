# Test ("next") profile (api-next-auction.aimcup.xyz). Only non-secret, environment-specific config
# lives here; secrets are supplied at runtime via environment variables — see auction-todo-by-me.md.
spring:
  graphql:
    graphiql:
      # Playground left on for the test environment to ease debugging.
      enabled: true

server:
  # Behind Nginx Proxy Manager (TLS terminated there); honour X-Forwarded-* headers.
  # NPM must use Scheme=http (the app serves plain HTTP on 8080; TLS is terminated at NPM).
  forward-headers-strategy: framework

logging:
  level:
    # Public port gets scanned/probed with malformed HTTP (bare LF, HTTP/1.0). Netty rejects them
    # and logs a WARN per hit — pure noise, so drop those decode-failure warnings to ERROR.
    reactor.netty.http.server.HttpServerOperations: ERROR

auction:
  frontend-url: https://auction-next.aimcup.xyz
  cors-allowed-origins: https://auction-next.aimcup.xyz
  security:
    # Test convenience: every signed-in osu! user may create auctions. Set AUCTION_DEV_GRANT_ADMIN=false
    # (and AUCTION_ADMIN_OSU_IDS) to lock it down.
    dev-grant-admin: ${AUCTION_DEV_GRANT_ADMIN:true}
  osu:
    # OAuth2 client id is public; the matching client secret comes from OSU_CLIENT_SECRET.
    client-id: ${OSU_CLIENT_ID:58580}
    redirect-uri: https://api-next-auction.aimcup.xyz/oauth2/callback/osu
